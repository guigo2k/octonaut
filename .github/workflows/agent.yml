name: agent

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'
  pull_request:
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yml'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/octonaut-agent

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: pw
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: agent/uv.lock

      # The lifespan shutdown path (agent/api.py) always shells out to the
      # real `kraken` binary to cancel open orders, even in tests that don't
      # touch it directly -- same installer the Dockerfile's runtime image uses.
      - name: Install kraken CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/krakenfx/kraken-cli/releases/latest/download/kraken-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - run: uv sync --frozen

      - run: uv run ruff check .

      - run: uv run pytest
        env:
          TEST_DATABASE_URL: postgresql+psycopg://postgres:pw@localhost:55433/postgres

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: agent
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,mode=max,scope=agent
