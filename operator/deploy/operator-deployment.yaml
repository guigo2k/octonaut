apiVersion: apps/v1
kind: Deployment
metadata:
  name: octonaut-operator
  namespace: octonaut
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octonaut-operator
  template:
    metadata:
      labels:
        app: octonaut-operator
    spec:
      serviceAccountName: octonaut-operator
      containers:
        - name: operator
          image: octonaut-operator:dev
          imagePullPolicy: IfNotPresent
          env:
            # Image the operator renders into every TradingAgent Deployment it
            # reconciles -- not a CRD field, since the CRD doesn't expose one.
            - name: AGENT_IMAGE
              value: octonaut-agent:dev
