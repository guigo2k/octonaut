apiVersion: apps/v1
kind: Deployment
metadata:
  name: octonaut-operator
  namespace: octonaut
spec:
  replicas: 1
  selector:
    matchLabels:
      app: octonaut-operator
  template:
    metadata:
      labels:
        app: octonaut-operator
    spec:
      serviceAccountName: octonaut-operator
      containers:
        - name: operator
          image: octonaut-operator:dev
          imagePullPolicy: IfNotPresent
          env:
            # Default image the operator renders into a TradingAgent
            # Deployment when the CR doesn't set spec.image itself.
            - name: AGENT_IMAGE
              value: octonaut-agent:dev
            # Off here (dev: open networking). Prod flips this to "true" via
            # its Kustomize overlay -- see clusters/prod/apps/octonaut-operator.yaml.
            - name: NETWORK_POLICY_ENABLED
              value: "false"


# --
