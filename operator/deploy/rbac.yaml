apiVersion: v1
kind: Namespace
metadata:
  name: octonaut
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: octonaut-operator
  namespace: octonaut
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: octonaut-operator
rules:
  - apiGroups: ["octonaut.rocks"]
    resources: ["tradingagents"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["octonaut.rocks"]
    resources: ["tradingagents/status"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["configmaps", "services", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: octonaut-operator
subjects:
  - kind: ServiceAccount
    name: octonaut-operator
    namespace: octonaut
roleRef:
  kind: ClusterRole
  name: octonaut-operator
  apiGroup: rbac.authorization.k8s.io
