apiVersion: octonaut.rocks/v1alpha1
kind: TradingAgent
metadata:
  name: moderate-agent
  namespace: default
spec:
  image: ghcr.io/guigo2k/octonaut-agent:latest

  openrouter:
    model: "openai/gpt-4o-mini"
    apiKey:
      secretKeyRef:
        name: octonaut-secret
        key: openrouter-key

  strategy:
    type: GRID
    ticker: ETHUSD
    balance: 50000
    prompt: |
      Run a grid on ETH/USD across a moderate range around the current price.
      Some drawdown between grid levels is expected and fine.
      Require reasonable, not exceptional, confirmation before entering.
      Never use leverage.

  ingress:
    className: traefik
    host: moderate-agent.octonaut.orphic.sh
  #   path: /
    tls:
      - secretName: moderate-agent-tls
        hosts:
          - moderate-agent.octonaut.orphic.sh

  resources:
    requests:
      cpu: 2
      memory: 2Gi
    limits:
      cpu: 4
      memory: 4Gi

  langfuse:
    address: "http://langfuse-web.langfuse.svc.cluster.local:3000"
    publicKey:
      secretKeyRef:
        name: langfuse-secret
        key: langfuse-public-key
    secretKey:
      secretKeyRef:
        name: langfuse-secret
        key: langfuse-secret-key

  # postgres:
  #   databaseUrl:
  #     secretKeyRef:
  #       name: moderate-agent-db
  #       key: DATABASE_URL
