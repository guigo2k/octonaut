apiVersion: octonaut.rocks/v1alpha1
kind: TradingAgent
metadata:
  name: aggressive-agent
  namespace: default
spec:
  image: ghcr.io/guigo2k/octonaut-agent:latest

  openrouter:
    model: "openai/gpt-4o-mini"
    apiKey:
      secretKeyRef:
        name: octonaut-secret
        key: openrouter-key

  strategy:
    type: TWAP
    ticker: SOLUSD
    balance: 100000
    prompt: |
      Work a TWAP execution into SOL/USD over the session, sized to
      take advantage of momentum rather than just averaging in blindly.
      Some risk of overpaying into a spike is acceptable in exchange for
      not missing a real move. Never use leverage.

  ingress:
    className: traefik
    host: aggressive-agent.octonaut.orphic.sh
    # path: /
    tls:
      - secretName: aggressive-agent-tls
        hosts:
          - aggressive-agent.octonaut.orphic.sh

  resources:
    requests:
      cpu: 2
      memory: 2Gi
    limits:
      cpu: 4
      memory: 4Gi

  langfuse:
    address: "http://langfuse-web.langfuse.svc.cluster.local:3000"
    publicKey:
      secretKeyRef:
        name: langfuse-secret
        key: langfuse-public-key
    secretKey:
      secretKeyRef:
        name: langfuse-secret
        key: langfuse-secret-key

  # postgres:
  #   databaseUrl:
  #     secretKeyRef:
  #       name: aggressive-agent-db
  #       key: DATABASE_URL
