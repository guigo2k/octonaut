apiVersion: octonaut.rocks/v1alpha1
kind: TradingAgent
metadata:
  name: conservative-agent
  namespace: default
spec:
  image: ghcr.io/guigo2k/octonaut-agent:latest

  openrouter:
    model: "openai/gpt-4o-mini"
    apiKey:
      secretKeyRef:
        name: octonaut-secret
        key: openrouter-key

  strategy:
    type: DCA
    ticker: BTCUSD
    balance: 20000
    prompt: |
      Dollar-cost-average into BTC/USD in small, regular increments.
      Skip a buy entirely rather than chase a move. Never use leverage.
      Preserve capital over squeezing out extra return.

  ingress:
    className: traefik
    host: conservative-agent.octonaut.orphic.sh
  #   path: /
    tls:
      - secretName: conservative-agent-tls
        hosts:
          - conservative-agent.octonaut.orphic.sh

  resources:
    requests:
      cpu: 2
      memory: 2Gi
    limits:
      cpu: 4
      memory: 4Gi

  langfuse:
    address: "http://langfuse-web.langfuse.svc.cluster.local:3000"
    publicKey:
      secretKeyRef:
        name: langfuse-secret
        key: langfuse-public-key
    secretKey:
      secretKeyRef:
        name: langfuse-secret
        key: langfuse-secret-key

  # postgres:
  #   databaseUrl:
  #     secretKeyRef:
  #       name: conservative-agent-db
  #       key: DATABASE_URL
