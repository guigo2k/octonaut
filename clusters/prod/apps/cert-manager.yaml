---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  project: default

  source:
    repoURL: quay.io/jetstack/charts
    chart: cert-manager
    targetRevision: v1.20.3
    helm:
      values: |
        crds:
          enabled: true

  destination:
    name: "in-cluster"
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # cert-manager's CRDs are large enough to blow past kubectl's
      # last-applied-configuration annotation size limit under client-side
      # apply -- a well-known cert-manager/Helm gotcha.
      - ServerSideApply=true
