---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: 'file:///opt/octonaut'
    path: clusters/dev/apps
    targetRevision: main
    directory:
      recurse: true
      include: "{*.yaml,*.yml}"

  destination:
    name: "in-cluster"
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
