apiVersion: octonaut.rocks/v1alpha1
kind: TradingAgent
metadata:
  name: moderate-pleiadian
  namespace: default
spec:
  openrouter:
    model: "poolside/laguna-m.1:free"
    apiKey:
      secretKeyRef:
        name: octonaut-secret
        key: openrouter-key

  strategy:
    type: GRID
    ticker: ETHUSD
    balance: 50000
    prompt: |
      Run a grid on ETH/USD across a moderate range around the current price.
      Some drawdown between grid levels is expected and fine.
      Require reasonable, not exceptional, confirmation before entering.
      Never use leverage.

  # ingress:
  #   className: traefik
  #   host: moderate-pleiadian.localhost
  #   path: /

  # resources:
  #   requests:
  #     cpu: 0.5
  #     memory: 512Mi
  #   limits:
  #     cpu:
  #     memory:

  langfuse:
    address: "http://langfuse-web.langfuse.svc.cluster.local:3000"
    publicKey:
      secretKeyRef:
        name: octonaut-secret
        key: langfuse-public-key
    secretKey:
      secretKeyRef:
        name: octonaut-secret
        key: langfuse-secret-key

  # postgres:
  #   databaseUrl:
  #     secretKeyRef:
  #       name: moderate-pleiadian-db
  #       key: DATABASE_URL
